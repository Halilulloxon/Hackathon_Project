<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Foydalanuvchi qo‘shish</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Segoe UI, sans-serif;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

            input:focus, select:focus {
                outline: none;
                border-color: #4facfe;
            }

        button {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

            button:hover {
                background: #1e90ff;
            }

        .messages {
            color: green;
            text-align: center;
            margin-bottom: 10px;
        }

        .back {
            text-align: center;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
            color: #4facfe;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Yangi foydalanuvchi qo‘shish</h2>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label>Login</label>
            <input type="text" name="username" placeholder="Login kiriting" required>

            <label>Parol</label>
            <input type="password" name="password" placeholder="Parol kiriting" required>

            <label>Rol tanlang</label>
            <select name="role" required>
                <option value="">Rol tanlang</option>
                <option value="admin">Admin</option>
                <option value="doctor">Doctor</option>
                <option value="pharmacy">Pharmacy</option>
                <option value="citizen">Oddiy aholi</option>
            </select>

            <button type="submit">Foydalanuvchi yaratish</button>

        </form>

        <div class="back">
            <a href="{% url 'home' %}">⬅ Bosh sahifaga qaytish</a>
        </div>

    </div>

</body>
</html>
