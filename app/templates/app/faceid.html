<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Face ID ro‘yxatdan o‘tish</title><link rel="stylesheet" href="{% static 'app/content/style.css' %}"></head>
<body>
<div class="container auth-card">
  <div class="card">
    <div class="header-left"><div class="logo">🧠</div><div><h1>Face ID profil yaratish</h1><p class="hint">Har bir odam bir marta ro‘yxatdan o‘tadi. Keyin kirishda Face ID tekshiriladi.</p></div></div>
    {% if messages %}{% for message in messages %}<div class="ai-alert {{ message.tags|default:'low' }}"><p>{{ message }}</p></div>{% endfor %}{% endif %}
    <form method="POST" class="form-grid" id="faceForm">{% csrf_token %}
      <input type="text" name="username" placeholder="Login" required>
      <input type="password" name="password" placeholder="Parol" required>
      <input type="text" name="full_name" placeholder="Ism Familiya" required>
      <select name="institution" required><option value="">Muassasani tanlang</option>{% for inst in institutions %}<option value="{{ inst.id }}">{{ inst.name }}</option>{% endfor %}</select>
      <select name="role" required><option value="">Rolni tanlang</option><option value="citizen">Oddiy aholi / bemor</option><option value="doctor">Shifokor</option><option value="pharmacy">Dorixona</option><option value="admin">Admin</option></select>
      <video id="video" class="camera" autoplay muted playsinline></video><canvas id="canvas" style="display:none"></canvas><input type="hidden" name="face_image" id="face_image">
      <div class="actions"><button class="btn-secondary" type="button" onclick="takePhoto()">📷 Face ID rasm olish</button><button class="btn-primary" type="submit" id="saveBtn">Saqlash</button><a class="btn-secondary" href="{% url 'login' %}">Login</a><a class="btn-secondary" href="{% url 'home' %}">Bosh sahifa</a></div>
    </form>
  </div>
</div>
<script>
const video=document.getElementById('video'),canvas=document.getElementById('canvas'),faceInput=document.getElementById('face_image'),form=document.getElementById('faceForm'),saveBtn=document.getElementById('saveBtn');
async function openCamera(){try{video.srcObject=await navigator.mediaDevices.getUserMedia({video:true});}catch(e){alert('Kamera ochilmadi. Brauzerda camera ruxsatini bering.');}}
function takePhoto(){canvas.width=video.videoWidth||640;canvas.height=video.videoHeight||480;canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);faceInput.value=canvas.toDataURL('image/png');alert('Rasm olindi. Endi Saqlashni bosing.');}
form.addEventListener('submit',e=>{if(!faceInput.value){e.preventDefault();alert('Avval Face ID rasm oling!');return;}saveBtn.disabled=true;saveBtn.textContent='Saqlanmoqda...';});openCamera();
</script>
</body></html>
